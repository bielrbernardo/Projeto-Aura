// ─── PARSE ARQUIVOS ───────────────────────────────────────────────────────────
async function parseArquivo(file) {
  const ext = file.name.split(".").pop().toLowerCase();
  if (ext === "csv" || ext === "txt") {
    const text = await file.text();
    const nomes = [];
    for (const linha of text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean)) {
      const nome = linha.split(/[,;\t]/).map(p=>p.trim()).find(p=>isNaN(Number(p))&&p.length>1);
      if (nome) nomes.push(nome);
    }
    return nomes;
  }
  if (ext === "xlsx" || ext === "xls") {
    const wb = XLSX.read(await file.arrayBuffer(), {type:"array"});
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
    return rows.map(r=>r.find(c=>typeof c==="string"&&isNaN(Number(c))&&c.trim().length>1)).filter(Boolean).map(n=>n.trim());
  }
  if (ext === "docx") {
    const raw = new TextDecoder("utf-8").decode(new Uint8Array(await file.arrayBuffer()));
    const matches = [...raw.matchAll(/<w:t[^>]*>([^<]+)<\/w:t>/g)].map(m=>m[1].trim()).filter(Boolean);
    return [...new Set(matches.join("\n").split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>1&&isNaN(Number(l))))];
  }
  return [];
}

  return <div style={{background:"#f1f5f9",borderRadius:99,height:6,width:"100%",overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",borderRadius:99,background:cor,transition:"width 0.5s cubic-bezier(.4,2,.6,1)"}}/></div>;

// ─── TELA DE LOGIN ────────────────────────────────────────────────────────────
function TelaLogin({onLogin}) {
  const [tela,   setTela]   = useState("login");
  const [nome,   setNome]   = useState("");
  const [email,  setEmail]  = useState("");
  const [senha,  setSenha]  = useState("");
  const [senha2, setSenha2] = useState("");
  const [erro,   setErro]   = useState("");
  const [sucesso,setSucesso]= useState("");
  const [showPw, setShowPw] = useState(false);
  const [loading,setLoading]= useState(false);

  function ir(t){setErro("");setSucesso("");setTela(t);}

  async function handleLogin() {
    setErro(""); setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(email.trim(), senha);
    } catch(e) {
      const msgs = {
        "auth/user-not-found":"E-mail não cadastrado.",
        "auth/wrong-password":"Senha incorreta.",
        "auth/invalid-email":"E-mail inválido.",
        "auth/invalid-credential":"E-mail ou senha incorretos.",
      };
      setErro(msgs[e.code] || "Erro ao entrar. Tente novamente.");
    }
    setLoading(false);
  }

  async function handleCadastro() {
    setErro(""); 
    if(!nome.trim()||!email||!senha||!senha2){setErro("Preencha todos os campos.");return;}
    if(senha.length<6){setErro("A senha deve ter ao menos 6 caracteres.");return;}
    if(senha!==senha2){setErro("As senhas não coincidem.");return;}
    setLoading(true);
    try {
      const cred = await auth.createUserWithEmailAndPassword(email.trim(), senha);
      await cred.user.updateProfile({displayName: nome.trim()});
      await db.collection("usuarios").doc(cred.user.uid).set({nome:nome.trim(),email:email.trim(),criadoEm:firebase.firestore.FieldValue.serverTimestamp()});
    } catch(e) {
      const msgs={"auth/email-already-in-use":"E-mail já cadastrado.","auth/invalid-email":"E-mail inválido.","auth/weak-password":"Senha muito fraca."};
      setErro(msgs[e.code]||"Erro ao criar conta.");
    }
    setLoading(false);
  }

  async function handleGoogle() {
    setErro(""); setLoading(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const cred = await auth.signInWithPopup(provider);
      const u = cred.user;
      await db.collection("usuarios").doc(u.uid).set({nome:u.displayName||"Professor",email:u.email,criadoEm:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    } catch(e) {
      setErro("Erro ao entrar com Google. Tente novamente.");
    }
    setLoading(false);
  }

  async function handleRecuperar() {
    setErro(""); setLoading(true);
    try {
      await auth.sendPasswordResetEmail(email.trim());
      setSucesso("E-mail de recuperação enviado! Verifique sua caixa de entrada.");
    } catch(e) {
      setErro("E-mail não encontrado ou inválido.");
    }
    setLoading(false);
  }

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg, #eef2ff 0%, #f0fdf4 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,fontFamily:"'Segoe UI', system-ui, sans-serif"}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:52,marginBottom:8}}>👑</div>
          <div style={{fontSize:26,fontWeight:900,color:C.text,letterSpacing:-0.5}}>Projeto Aura</div>
          <div style={{fontSize:13,color:C.textSub,marginTop:4}}>Sistema de Gamificação Escolar</div>
        </div>

        <div style={{background:C.card,borderRadius:20,padding:28,boxShadow:"0 8px 40px #6366f115, 0 1px 4px #0000000a",border:`1px solid ${C.border}`}}>
          {tela!=="recuperar"&&(
            <div style={{display:"flex",background:"#f1f5f9",borderRadius:12,padding:4,marginBottom:24}}>
              {[["login","Entrar"],["cadastro","Criar conta"]].map(([key,lbl])=>(
                <button key={key} onClick={()=>ir(key)} style={{flex:1,padding:"8px",background:tela===key?C.card:"transparent",border:"none",borderRadius:9,fontWeight:700,fontSize:13,color:tela===key?C.primary:C.textSub,cursor:"pointer",boxShadow:tela===key?"0 1px 4px #0000001a":"none",transition:"all 0.2s"}}>{lbl}</button>
              ))}
            </div>
          )}

          {tela==="recuperar"&&<div style={{marginBottom:20}}><div style={{fontWeight:800,fontSize:17,color:C.text}}>Recuperar senha</div><div style={{fontSize:13,color:C.textSub,marginTop:2}}>Informe seu e-mail para receber as instruções.</div></div>}

          {erro&&<div style={{background:C.redBg,border:`1px solid ${C.red}30`,color:C.red,borderRadius:10,padding:"9px 13px",fontSize:13,fontWeight:600,marginBottom:14}}>⚠️ {erro}</div>}
          {sucesso&&<div style={{background:C.greenBg,border:`1px solid ${C.green}30`,color:C.green,borderRadius:10,padding:"9px 13px",fontSize:13,fontWeight:600,marginBottom:14}}>✅ {sucesso}</div>}

          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {tela==="cadastro"&&<div><Label>Nome completo</Label><Input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Seu nome"/></div>}
            <div><Label>E-mail</Label><Input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="professor@escola.com.br" onKeyDown={e=>e.key==="Enter"&&tela==="login"&&handleLogin()}/></div>
            {tela!=="recuperar"&&(
              <div>
                <Label>Senha</Label>
                <div style={{position:"relative"}}>
                  <Input type={showPw?"text":"password"} value={senha} onChange={e=>setSenha(e.target.value)} placeholder={tela==="cadastro"?"Mínimo 6 caracteres":"Sua senha"} onKeyDown={e=>e.key==="Enter"&&tela==="login"&&handleLogin()} style={{paddingRight:44}}/>
                  <button onClick={()=>setShowPw(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",cursor:"pointer",fontSize:16,color:C.textMuted}}>{showPw?"🙈":"👁️"}</button>
                </div>
              </div>
            )}
            {tela==="cadastro"&&<div><Label>Confirmar senha</Label><Input type={showPw?"text":"password"} value={senha2} onChange={e=>setSenha2(e.target.value)} placeholder="Repita a senha" onKeyDown={e=>e.key==="Enter"&&handleCadastro()}/></div>}
          </div>

          {tela==="login"&&<div style={{textAlign:"right",marginTop:8}}><button onClick={()=>ir("recuperar")} style={{background:"transparent",border:"none",color:C.primary,fontSize:12,cursor:"pointer",fontWeight:600}}>Esqueceu a senha?</button></div>}

          <button onClick={tela==="login"?handleLogin:tela==="cadastro"?handleCadastro:handleRecuperar} disabled={loading}
            style={{width:"100%",marginTop:20,background:loading?"#a5b4fc":C.primary,border:"none",borderRadius:12,padding:"13px",color:"#fff",fontWeight:800,fontSize:15,cursor:loading?"not-allowed":"pointer",transition:"all 0.2s"}}>
            {loading?"⏳ Aguarde...":tela==="login"?"Entrar":tela==="cadastro"?"Criar conta":"Enviar instruções"}
          </button>

          {tela!=="recuperar"&&(<>

              <span style={{color:C.textMuted,fontSize:12}}>ou continue com</span>
              <div style={{flex:1,height:1,background:C.border}}/>
            </div>
            <button onClick={handleGoogle} disabled={loading}
              style={{width:"100%",background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:12,padding:"11px",color:C.text,fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}
              onMouseEnter={e=>e.currentTarget.style.background="#f8f9fb"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
              <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.2 33.6 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.9 0 20-7.9 20-21 0-1.3-.2-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 5.1 29.5 3 24 3 16.2 3 9.5 7.9 6.3 14.7z"/><path fill="#FBBC05" d="M24 45c5.4 0 10.3-1.8 14.1-4.9l-6.5-5.3C29.5 36.5 26.9 37 24 37c-5.6 0-10.2-3.4-11.7-8.1l-7 5.4C8.8 41.1 15.8 45 24 45z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.7c-.9 2.6-2.6 4.8-4.8 6.3l6.5 5.3C41.4 37 45 31 45 24c0-1.3-.2-2.7-.5-4z"/></svg>
              Entrar com Google

          {tela==="recuperar"&&!sucesso&&<button onClick={()=>ir("login")} style={{width:"100%",marginTop:12,background:"transparent",border:"none",color:C.textSub,fontSize:13,cursor:"pointer",fontWeight:600}}>← Voltar ao login</button>}
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:11,color:C.textMuted}}>🔒 Dados salvos com segurança no Firebase</div>
      </div>

  // ── AUTH LISTENER ──
  useEffect(() => {
    return auth.onAuthStateChanged(async u => {
      if (u) {
        const doc = await db.collection("usuarios").doc(u.uid).get();
        setUsuario({ uid: u.uid, nome: u.displayName || doc.data()?.nome || "Professor", email: u.email });
      } else {
        setUsuario(null);
      }
    });
  }, []);

  // ── CARREGAR TURMAS DO FIRESTORE ──
  useEffect(() => {
    if (!usuario?.uid) return;
    const unsub = db.collection("usuarios").doc(usuario.uid).collection("turmas")
      .orderBy("criadaEm","asc")
      .onSnapshot(snap => {
        const lista = snap.docs.map(d => ({ id: d.id, ...d.data(), acoes: d.data().acoes || ACOES_PADRAO }));
        setTurmas(lista);
        if (lista.length && !turmaId) setTurmaId(lista[0].id);
      });
    return unsub;
  }, [usuario?.uid]);

  function showToast(msg,tipo="info") {
    clearTimeout(toastRef.current);
    setToast({msg,tipo});
    toastRef.current = setTimeout(()=>setToast(null),2800);
  }

  const turmaAtual = turmas.find(t=>t.id===turmaId) || turmas[0];
  const alunos     = turmaAtual?.alunos    || [];
  const historico  = turmaAtual?.historico || [];
  const acoes      = turmaAtual?.acoes     || [];
  const ranking    = [...alunos].sort((a,b)=>b.pontos-a.pontos);
  const alunoSel   = alunos.find(a=>a.id===selId);
  const nivelSel   = alunoSel ? getNivel(alunoSel.pontos) : null;
  const proxNivel  = nivelSel ? NIVEIS[Math.min(NIVEIS.length-1,nivelSel.id+1)] : null;
  const histAluno  = historico.filter(h=>h.alunoId===selId);

  function turmaRef(id) { return db.collection("usuarios").doc(usuario.uid).collection("turmas").doc(id||turmaAtual.id); }

  // ── TURMAS ──
  async function criarTurma(nome) {
    setSalvando(true);
    const doc = await db.collection("usuarios").doc(usuario.uid).collection("turmas").add({
      nome:nome.trim(), alunos:[], historico:[], acoes:ACOES_PADRAO,
      criadaEm: firebase.firestore.FieldValue.serverTimestamp()
    });
    setTurmaId(doc.id); setSelId(null); setAba("ranking");
    showToast(`Turma "${nome.trim()}" criada!`,"success");
    setSalvando(false);
  }
  async function deletarTurma(id) {
    if(turmas.length===1){showToast("Precisa ter ao menos 1 turma!","error");return;}
    await turmaRef(id).delete();
    const restantes = turmas.filter(t=>t.id!==id);
    setTurmaId(restantes[0]?.id||null); setSelId(null);
    showToast("Turma removida.","info");
  }
  async function renomearTurma(id,nome) { await turmaRef(id).update({nome}); }

  // ── ALUNOS ──
  async function adicionarAluno(nomeParam) {
    const n = (nomeParam||novoNome).trim();
    if(!n) return false;
    if(alunos.find(a=>a.nome.toLowerCase()===n.toLowerCase())) return false;
    const novos = [...alunos, {id:uid(), nome:n, pontos:0}];
    await turmaRef().update({alunos:novos});
    return true;
  }
  async function adicionarAlunoInput() {
    if(!await adicionarAluno()){showToast("Aluno já existe ou nome vazio!","error");return;}
    showToast(`${novoNome.trim()} adicionado! 🎮`,"success");
    setNovoNome("");
  }
  async function removerAluno(alunoId) {
    const novos = alunos.filter(a=>a.id!==alunoId);
    const novoHist = historico.filter(h=>h.alunoId!==alunoId);
    await turmaRef().update({alunos:novos, historico:novoHist});
    if(selId===alunoId) setSelId(null);
    showToast("Aluno removido.","info");
  }

  // ── IMPORTAR ──
  async function processarArquivo(file) {
    setImportLoading(true);
    try {
      const nomes = [...new Set(await parseArquivo(file))].filter(n=>n.length>1);
      if(!nomes.length){showToast("Nenhum nome encontrado.","error");setImportLoading(false);return;}
      setImportNomes(nomes); setMData({fileName:file.name}); setModal("import");
    } catch(e){ showToast("Erro ao ler arquivo.","error"); }
    setImportLoading(false);
  }
  async function confirmarImport(selecionados) {
    let add=0;
    for(const nome of selecionados){ if(await adicionarAluno(nome)) add++; }
    showToast(`${add} aluno(s) importado(s)!`,"success");
    setModal(null); setImportNomes([]);
  }

  // ── AÇÕES ──
  async function aplicarAcao(alunoId, acao) {
    const novosAlunos = alunos.map(a => {
      if(a.id!==alunoId) return a;
      const antes  = getNivel(a.pontos);
      const novos  = Math.max(0, a.pontos+acao.valor);
      const depois = getNivel(novos);
      if(depois.id>antes.id) setTimeout(()=>showToast(`LEVEL UP! ${a.nome} → ${depois.nome} ${depois.emoji}`,"success"),0);
      else if(depois.id<antes.id) setTimeout(()=>showToast(`${a.nome} perdeu nível → ${depois.nome}`,"error"),0);
      else setTimeout(()=>showToast(`${acao.icon} ${a.nome}: ${acao.valor>0?"+":""}${acao.valor} AURA`,"info"),0);
      return {...a, pontos:novos};
    });
    const aluno = alunos.find(a=>a.id===alunoId);
    const novoHist = [{id:uid(),alunoId,alunoNome:aluno?.nome,acao:acao.label,valor:acao.valor,icon:acao.icon,data:new Date().toLocaleString("pt-BR")},...historico].slice(0,200);
    await turmaRef().update({alunos:novosAlunos, historico:novoHist});
  }
  async function salvarAcao(editId) {
    const valor = parseInt(formAcao.valor,10);
    if(!formAcao.label.trim()||isNaN(valor)||valor===0){showToast("Preencha nome e valor!","error");return;}
    const fv = formAcao.tipo==="negativo"?-Math.abs(valor):Math.abs(valor);
    let novasAcoes;
    if(editId) {
      novasAcoes = acoes.map(a=>a.id===editId?{...a,label:formAcao.label.trim(),valor:fv,icon:formAcao.icon,cor:formAcao.cor,corBg:formAcao.corBg}:a);
      showToast("Ação atualizada!","success");
    } else {
      novasAcoes = [...acoes,{id:uid(),label:formAcao.label.trim(),valor:fv,icon:formAcao.icon,cor:formAcao.cor,corBg:formAcao.corBg,custom:true}];
      showToast(`Ação "${formAcao.label.trim()}" criada!`,"success");
    }
    await turmaRef().update({acoes:novasAcoes});
    setModal(null);
  }
  async function deletarAcao(id) {
    await turmaRef().update({acoes:acoes.filter(a=>a.id!==id)});
    showToast("Ação removida.","info"); setModal(null);
  }
  function abrirNovaAcao(){setFormAcao({label:"",valor:"",icon:"🎯",cor:C.green,corBg:C.greenBg,tipo:"positivo"});setMData({});setModal("acao");}
  function abrirEditAcao(a){setFormAcao({label:a.label,valor:String(Math.abs(a.valor)),icon:a.icon,cor:a.cor,corBg:a.corBg||C.primaryBg,tipo:a.valor<0?"negativo":"positivo"});setMData({editId:a.id,custom:a.custom});setModal("acao");}

  // ── GUARDS ──
  if(usuario===undefined) return <Spinner/>;
  if(!usuario) return <TelaLogin/>;

  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Segoe UI', system-ui, sans-serif",color:C.text,paddingBottom:48}}>
      <Toast toast={toast}/>

      {/* HEADER */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"14px 16px 0",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px #0000000a"}}>
        <div style={{maxWidth:520,margin:"0 auto"}}>

          {/* Usuário */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:34,height:34,borderRadius:50,background:C.primaryBg,border:`2px solid ${C.primary}`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,color:C.primary,flexShrink:0}}>
                {usuario.nome.charAt(0).toUpperCase()}
              </div>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:C.text,lineHeight:1.2}}>{usuario.nome}</div>
                <div style={{fontSize:10,color:C.textMuted}}>{usuario.email}</div>
              </div>
            </div>
            <button onClick={()=>{if(window.confirm("Deseja sair?")) auth.signOut();}}
              style={{background:"#f1f5f9",border:"none",borderRadius:8,padding:"5px 12px",color:C.textSub,fontWeight:600,fontSize:12,cursor:"pointer"}}>
              Sair
            </button>
          </div>

          {/* Turmas */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{flex:1,overflowX:"auto",display:"flex",gap:6,paddingBottom:2}}>
              {turmas.map(t=>(
                <button key={t.id} onClick={()=>{setTurmaId(t.id);setSelId(null);setAba("ranking");}}
                  style={{flexShrink:0,background:t.id===turmaId?C.primary:"#f1f5f9",border:"none",borderRadius:20,padding:"5px 14px",color:t.id===turmaId?"#fff":C.textSub,fontWeight:700,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.15s"}}>
                  {t.nome}
                </button>
              ))}
            </div>
            <Btn onClick={()=>{setMData({});setModal("novaTurma");}} variant="outline" size="sm">+ Nova</Btn>
          </div>

          {/* Nome turma */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:2}}>
            {editNome?(
              <input value={nomeEdit} onChange={e=>setNomeEdit(e.target.value)}
                onBlur={()=>{renomearTurma(turmaAtual.id,nomeEdit||turmaAtual.nome);setEditNome(false);}}
                onKeyDown={e=>{if(e.key==="Enter"){renomearTurma(turmaAtual.id,nomeEdit||turmaAtual.nome);setEditNome(false);}}}
                autoFocus style={{background:"transparent",border:"none",borderBottom:`2px solid ${C.primary}`,color:C.text,fontSize:17,fontWeight:800,textAlign:"center",outline:"none",width:220}}/>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:17,fontWeight:800,color:C.text}}>{turmaAtual?.nome||"Carregando..."}</span>
                {turmaAtual&&<><button onClick={()=>{setNomeEdit(turmaAtual.nome);setEditNome(true);}} style={{background:"transparent",border:"none",color:C.textMuted,cursor:"pointer",fontSize:14,padding:0}}>✏️</button>
                <button onClick={()=>{setMData({turmaId:turmaAtual.id});setModal("delTurma");}} style={{background:"transparent",border:"none",color:C.textMuted,cursor:"pointer",fontSize:13,padding:0}}>🗑️</button></>}
              </div>
            )}
          </div>
          <div style={{textAlign:"center",color:C.textMuted,fontSize:11,marginBottom:12}}>👥 {alunos.length} alunos · Ranking de Aura</div>

          {/* Abas */}
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`}}>
            {[["ranking","🏆 Ranking"],["registrar","⚡ Registrar"],["acoes","🎯 Ações"],["historico","📋 Histórico"]].map(([key,lbl])=>(
              <button key={key} onClick={()=>setAba(key)} style={{flex:1,padding:"9px 2px",background:"transparent",border:"none",borderBottom:aba===key?`3px solid ${C.primary}`:"3px solid transparent",color:aba===key?C.primary:C.textSub,fontWeight:700,fontSize:11,cursor:"pointer",transition:"all 0.15s"}}>{lbl}</button>
            ))}
          </div>
        </div>
      </div>

      {/* CONTEÚDO */}
      <div style={{maxWidth:520,margin:"0 auto",padding:"16px 14px 0"}}>

        {/* ── RANKING ── */}
        {aba==="ranking"&&(<>
          <Card style={{marginBottom:14,padding:14}}>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <Input value={novoNome} onChange={e=>setNovoNome(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adicionarAlunoInput()} placeholder="Nome do aluno..." style={{flex:1}}/>
              <Btn onClick={adicionarAlunoInput} variant="primary">+ Add</Btn>
            </div>
            <div onDragOver={e=>{e.preventDefault();setImportDrag(true);}} onDragLeave={()=>setImportDrag(false)}
              onDrop={async e=>{e.preventDefault();setImportDrag(false);const f=e.dataTransfer?.files?.[0];if(f)await processarArquivo(f);}}
              onClick={()=>fileRef.current.click()}
              style={{border:`2px dashed ${importDrag?C.primary:C.borderMd}`,borderRadius:10,padding:"12px 10px",textAlign:"center",cursor:"pointer",background:importDrag?C.primaryBg:"#f8f9fb",transition:"all 0.2s"}}>
              <div style={{fontSize:22,marginBottom:4}}>{importLoading?"⏳":"📂"}</div>
              <div style={{fontWeight:700,fontSize:13,color:importDrag?C.primary:C.textSub}}>{importLoading?"Lendo arquivo...":"Arrastar ou clicar para importar lista"}</div>
              <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>Excel (.xlsx), CSV, TXT, Word (.docx)</div>
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.txt,.docx" style={{display:"none"}} onChange={e=>{if(e.target.files[0])processarArquivo(e.target.files[0]);e.target.value="";}}/>
            </div>
          </Card>

          {ranking.length===0&&<div style={{textAlign:"center",color:C.textMuted,padding:"40px 0",fontSize:14}}><div style={{fontSize:40,marginBottom:10}}>🎮</div>Nenhum aluno ainda.<br/>Adicione um por um ou importe uma lista!</div>}

          {ranking.map((aluno,idx)=>{
            const nivel=getNivel(aluno.pontos);
            const prox=NIVEIS[Math.min(NIVEIS.length-1,nivel.id+1)];
            const isSel=selId===aluno.id;
            return(
              <div key={aluno.id} onClick={()=>{setSelId(isSel?null:aluno.id);if(!isSel)setAba("registrar");}}
                style={{background:isSel?nivel.bg:C.card,border:`1.5px solid ${isSel?nivel.cor:C.border}`,borderRadius:14,padding:"12px 13px",marginBottom:8,cursor:"pointer",transition:"all 0.2s",boxShadow:isSel?`0 2px 12px ${nivel.cor}30`:"0 1px 3px #0000000a"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:32,height:32,borderRadius:10,background:idx<3?nivel.bg:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:idx<3?18:13,color:C.textSub,flexShrink:0,border:`1px solid ${C.border}`}}>
                    {idx===0?"🥇":idx===1?"🥈":idx===2?"🥉":`#${idx+1}`}
                  </div>
                  <span style={{fontSize:22}}>{nivel.emoji}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:2}}>{aluno.nome}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                      <Chip cor={nivel.cor} bg={nivel.bg}>{nivel.nome}</Chip>
                      <Stars count={nivel.stars}/>
                    </div>
                    <ProgressBar valor={aluno.pontos-nivel.min} max={nivel.id<NIVEIS.length-1?prox.min-nivel.min:1} cor={nivel.cor}/>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:6}}>
                    <div style={{fontWeight:800,fontSize:17,color:nivel.cor}}>{aluno.pontos.toLocaleString()}</div>
                    <div style={{fontSize:9,color:C.textMuted,fontWeight:600}}>AURA</div>
                  </div>
                  <button onClick={e=>{e.stopPropagation();setMData({alunoId:aluno.id,nome:aluno.nome});setModal("delAluno");}} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,color:C.textMuted,padding:"3px 8px",cursor:"pointer",fontSize:12,flexShrink:0}}>✕</button>
                </div>
              </div>
            );
          })}

          {alunos.length>0&&(
            <Card style={{marginTop:18}}>
              <Label>Tabela de Níveis</Label>
              {NIVEIS.map(n=>(
                <div key={n.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:18,width:24}}>{n.emoji}</span>
                  <div style={{flex:1}}><Chip cor={n.cor} bg={n.bg}>{n.nome}</Chip><span style={{color:C.textMuted,fontSize:11,marginLeft:6}}>"{n.frase}"</span></div>
                  <Stars count={n.stars}/>
                  <span style={{color:C.textMuted,fontSize:11,minWidth:46,textAlign:"right"}}>{n.min===0?"0":n.min.toLocaleString()}+</span>
                </div>
              ))}
            </Card>
          )}
        </>)}

        {/* ── REGISTRAR ── */}
        {aba==="registrar"&&(<>
          <Label>Selecionar Aluno</Label>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:16}}>
            {ranking.map(a=>{
              const nivel=getNivel(a.pontos);const isSel=selId===a.id;
              return(<button key={a.id} onClick={()=>setSelId(isSel?null:a.id)}
                style={{background:isSel?nivel.bg:"#f1f5f9",border:`1.5px solid ${isSel?nivel.cor:C.border}`,borderRadius:99,padding:"6px 13px",color:isSel?nivel.cor:C.textSub,fontWeight:isSel?700:500,fontSize:13,cursor:"pointer",transition:"all 0.15s"}}>
                {nivel.emoji} {a.nome}</button>);
            })}
          </div>
          {alunos.length===0&&<div style={{color:C.textMuted,fontSize:13}}>Adicione alunos na aba Ranking primeiro.</div>}

          {alunoSel&&nivelSel&&(<>
            <Card style={{marginBottom:14,background:nivelSel.bg,border:`1.5px solid ${nivelSel.cor}40`}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:38}}>{nivelSel.emoji}</div><Stars count={nivelSel.stars}/></div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:18,color:C.text}}>{alunoSel.nome}</div>
                  <Chip cor={nivelSel.cor} bg="#fff" size="lg">{nivelSel.nome}</Chip>
                  <div style={{color:C.textSub,fontSize:11,fontStyle:"italic",margin:"4px 0 8px"}}>"{nivelSel.frase}"</div>
                  <div style={{fontSize:26,fontWeight:900,color:nivelSel.cor}}>{alunoSel.pontos.toLocaleString()} <span style={{fontSize:12,fontWeight:600,color:C.textSub}}>AURA</span></div>
                  {nivelSel.id<NIVEIS.length-1&&proxNivel&&(<><ProgressBar valor={alunoSel.pontos-nivelSel.min} max={proxNivel.min-nivelSel.min} cor={nivelSel.cor}/><div style={{color:C.textMuted,fontSize:10,marginTop:3}}>{(proxNivel.min-alunoSel.pontos).toLocaleString()} AURA para {proxNivel.nome}</div></>)}
                </div>
              </div>
            </Card>

            <Label>Aplicar Ação</Label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {acoes.map(acao=>(
                <button key={acao.id} onClick={()=>aplicarAcao(alunoSel.id,acao)}
                  style={{background:acao.corBg||"#f1f5f9",border:`1.5px solid ${acao.cor}30`,borderRadius:12,padding:"12px 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"opacity 0.15s"}}
                  onMouseEnter={e=>e.currentTarget.style.opacity="0.8"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                  <span style={{fontSize:20}}>{acao.icon}</span>
                  <span style={{color:acao.cor,fontWeight:700,fontSize:11,textAlign:"center"}}>{acao.label}</span>
                  <span style={{color:acao.valor>0?C.green:C.red,fontWeight:900,fontSize:15}}>{acao.valor>0?"+":""}{acao.valor}</span>
                </button>
              ))}
            </div>

            {histAluno.length>0&&(<div style={{marginTop:18}}>
              <Label>Últimas ações de {alunoSel.nome}</Label>
              {histAluno.slice(0,6).map(h=>(
                <div key={h.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:6}}>
                  <span style={{fontSize:13,color:C.text}}>{h.icon} {h.acao}</span>
                  <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:13,color:h.valor>0?C.green:C.red}}>{h.valor>0?"+":""}{h.valor}</div><div style={{color:C.textMuted,fontSize:9}}>{h.data}</div></div>
                </div>
              ))}
            </div>)}
          </>)}
          {!alunoSel&&alunos.length>0&&<div style={{textAlign:"center",color:C.textMuted,padding:"30px 0",fontSize:13}}>Selecione um aluno acima ⬆️</div>}
        </>)}

        {/* ── AÇÕES ── */}
        {aba==="acoes"&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <Label>Ações · {acoes.length}</Label>
            <Btn onClick={abrirNovaAcao} variant="success" size="sm">+ Nova Ação</Btn>
          </div>
          {acoes.map(acao=>(
            <Card key={acao.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"11px 13px"}}>
              <div style={{width:38,height:38,borderRadius:10,background:acao.corBg||"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{acao.icon}</div>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:acao.cor}}>{acao.label}</div>{acao.custom&&<Chip cor={C.primary} bg={C.primaryBg}>CUSTOM</Chip>}</div>
              <div style={{fontWeight:900,fontSize:17,color:acao.valor>0?C.green:C.red,minWidth:52,textAlign:"right"}}>{acao.valor>0?"+":""}{acao.valor}</div>
              <button onClick={()=>abrirEditAcao(acao)} style={{background:"#f1f5f9",border:"none",borderRadius:8,color:C.textSub,padding:"6px 10px",cursor:"pointer",fontSize:13}}>✏️</button>
            </Card>
          ))}
        </>)}

        {/* ── HISTÓRICO ── */}
        {aba==="historico"&&(<>
          <Label>Histórico · {historico.length} registros</Label>
          {historico.length===0&&<div style={{textAlign:"center",color:C.textMuted,padding:"40px 0",fontSize:13}}>Nenhum registro ainda. ⚡</div>}
          {historico.map(h=>{
            const a=alunos.find(x=>x.id===h.alunoId);const n=a?getNivel(a.pontos):null;
            return(<Card key={h.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7,padding:"9px 13px"}}>
              <div><div style={{fontWeight:700,fontSize:13,color:n?.cor||C.textSub}}>{n?.emoji||"❓"} {h.alunoNome}</div><div style={{color:C.textMuted,fontSize:11}}>{h.icon} {h.acao} · {h.data}</div></div>
              <span style={{fontWeight:900,fontSize:15,color:h.valor>0?C.green:C.red}}>{h.valor>0?"+":""}{h.valor}</span>
            </Card>);
          })}
        </>)}
      </div>

      {/* MODAIS */}
      {modal==="novaTurma"&&(<Modal title="🏫 Nova Turma" onClose={()=>setModal(null)}>
        <Label>Nome da turma</Label>
        <Input placeholder="Ex: 9º Ano A, 2EM Tarde..." value={mData.nome||""} onChange={e=>setMData(d=>({...d,nome:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter"&&mData.nome?.trim()){criarTurma(mData.nome);setModal(null);}}} style={{marginBottom:16}}/>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={()=>setModal(null)} variant="ghost" style={{flex:1}}>Cancelar</Btn>
          <Btn onClick={()=>{if(mData.nome?.trim()){criarTurma(mData.nome);setModal(null);}}} variant="primary" style={{flex:2}}>Criar Turma</Btn>
        </div>
      </Modal>)}

      {modal==="acao"&&(<Modal title={mData.editId?"✏️ Editar Ação":"➕ Nova Ação"} onClose={()=>setModal(null)}>
        <Label>Nome</Label><Input value={formAcao.label} onChange={e=>setFormAcao(f=>({...f,label:e.target.value}))} placeholder="Ex: Prova Entregue..." style={{marginBottom:12}}/>
        <Label>Tipo</Label>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["positivo","✅ Positiva",C.green,C.greenBg],["negativo","❌ Negativa",C.red,C.redBg]].map(([val,lbl,cor,bg])=>(
            <button key={val} onClick={()=>setFormAcao(f=>({...f,tipo:val}))} style={{flex:1,background:formAcao.tipo===val?bg:"#f1f5f9",border:`1.5px solid ${formAcao.tipo===val?cor:C.border}`,borderRadius:10,padding:"8px",color:formAcao.tipo===val?cor:C.textSub,fontWeight:700,fontSize:13,cursor:"pointer"}}>{lbl}</button>
          ))}
        </div>
        <Label>Valor de Aura</Label><Input type="number" min={1} value={formAcao.valor} onChange={e=>setFormAcao(f=>({...f,valor:e.target.value}))} placeholder="Ex: 150" style={{marginBottom:12}}/>
        <Label>Ícone</Label>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
          {EMOJIS_OPCOES.map(em=><button key={em} onClick={()=>setFormAcao(f=>({...f,icon:em}))} style={{fontSize:18,background:formAcao.icon===em?C.primaryBg:"#f1f5f9",border:`2px solid ${formAcao.icon===em?C.primary:"transparent"}`,borderRadius:8,padding:"3px 6px",cursor:"pointer"}}>{em}</button>)}
        </div>
        <Label>Cor</Label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
          {CORES_OPCOES.map(({cor,bg})=><button key={cor} onClick={()=>setFormAcao(f=>({...f,cor,corBg:bg}))} style={{width:26,height:26,borderRadius:50,background:cor,border:`3px solid ${formAcao.cor===cor?C.text:"transparent"}`,cursor:"pointer",boxShadow:formAcao.cor===cor?`0 0 0 2px #fff, 0 0 0 4px ${cor}`:"none"}}/>)}
        </div>
        <div style={{background:formAcao.corBg||"#f1f5f9",border:`1.5px solid ${formAcao.cor}30`,borderRadius:12,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>{formAcao.icon}</span>
          <span style={{color:formAcao.cor,fontWeight:700,fontSize:14}}>{formAcao.label||"Prévia"}</span>
          <span style={{marginLeft:"auto",fontWeight:900,color:formAcao.tipo==="positivo"?C.green:C.red}}>{formAcao.tipo==="positivo"?"+":"-"}{formAcao.valor||"0"}</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={()=>setModal(null)} variant="ghost" style={{flex:1}}>Cancelar</Btn>
          {mData.editId&&mData.custom&&<Btn onClick={()=>setModal("delAcao")} variant="danger">🗑️</Btn>}
          <Btn onClick={()=>salvarAcao(mData.editId||null)} variant="success" style={{flex:2}}>Salvar</Btn>
        </div>
      </Modal>)}

      {modal==="import"&&(<Modal title={`📂 Importar de "${mData.fileName}"`} onClose={()=>setModal(null)}>
        <div style={{color:C.textSub,fontSize:13,marginBottom:12}}>{importNomes.length} nome(s) encontrado(s). Selecione os que deseja adicionar à turma <b style={{color:C.text}}>{turmaAtual?.nome}</b>:</div>
        <ImportSelector nomes={importNomes} alunosExistentes={alunos} onConfirm={confirmarImport} onCancel={()=>setModal(null)}/>
      </Modal>)}

      {modal==="delAluno"&&(<Modal title="Remover aluno?" onClose={()=>setModal(null)}>
        <div style={{color:C.textSub,fontSize:14,marginBottom:18}}>Isso vai apagar <b style={{color:C.text}}>{mData.nome}</b> e todo o histórico dele nesta turma.</div>
        <div style={{display:"flex",gap:8}}><Btn onClick={()=>setModal(null)} variant="ghost" style={{flex:1}}>Cancelar</Btn><Btn onClick={()=>{removerAluno(mData.alunoId);setModal(null);}} variant="danger" style={{flex:1}}>Remover</Btn></div>
      </Modal>)}

      {modal==="delTurma"&&(<Modal title="Deletar turma?" onClose={()=>setModal(null)}>
        <div style={{color:C.textSub,fontSize:14,marginBottom:18}}>Todos os alunos e histórico de <b style={{color:C.text}}>{turmaAtual?.nome}</b> serão removidos permanentemente.</div>
        <div style={{display:"flex",gap:8}}><Btn onClick={()=>setModal(null)} variant="ghost" style={{flex:1}}>Cancelar</Btn><Btn onClick={()=>{deletarTurma(mData.turmaId);setModal(null);}} variant="danger" style={{flex:1}}>Deletar</Btn></div>
      </Modal>)}

      {modal==="delAcao"&&(<Modal title="Remover ação?" onClose={()=>setModal(null)}>
        <div style={{color:C.textSub,fontSize:14,marginBottom:18}}>A ação <b style={{color:C.text}}>{formAcao.label}</b> será removida desta turma.</div>
        <div style={{display:"flex",gap:8}}><Btn onClick={()=>setModal("acao")} variant="ghost" style={{flex:1}}>Cancelar</Btn><Btn onClick={()=>deletarAcao(mData.editId)} variant="danger" style={{flex:1}}>Remover</Btn></div>
      </Modal>)}
    </div>
  );
}

// ─── IMPORT SELECTOR ─────────────────────────────────────────────────────────
function ImportSelector({nomes,alunosExistentes,onConfirm,onCancel}) {
  const existentes = new Set(alunosExistentes.map(a=>a.nome.toLowerCase()));
  const [sel,setSel] = useState(()=>new Set(nomes.filter(n=>!existentes.has(n.toLowerCase()))));
  const disponiveis = nomes.filter(n=>!existentes.has(n.toLowerCase()));
  function toggle(nome){setSel(prev=>{const s=new Set(prev);s.has(nome)?s.delete(nome):s.add(nome);return s;});}
  function toggleAll(){setSel(prev=>prev.size===disponiveis.length?new Set():new Set(disponiveis));}
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <span style={{fontSize:12,color:C.textSub}}>{sel.size} selecionado(s)</span>
      <button onClick={toggleAll} style={{fontSize:12,color:C.primary,background:"transparent",border:"none",cursor:"pointer",fontWeight:700}}>{sel.size===disponiveis.length?"Desmarcar todos":"Selecionar todos"}</button>
    </div>
    <div style={{maxHeight:240,overflowY:"auto",border:`1px solid ${C.border}`,borderRadius:10,marginBottom:14}}>
      {nomes.map((nome,i)=>{
        const jaExiste=existentes.has(nome.toLowerCase());const marcado=sel.has(nome);
        return(<div key={i} onClick={()=>!jaExiste&&toggle(nome)}
          style={{display:"flex",alignItems:"center",gap:10,padding:"9px 13px",borderBottom:i<nomes.length-1?`1px solid ${C.border}`:"none",cursor:jaExiste?"default":"pointer",background:jaExiste?"#f8f9fb":marcado?C.primaryBg:"#fff",transition:"background 0.15s"}}>
          <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${jaExiste?C.borderMd:marcado?C.primary:C.borderMd}`,background:marcado&&!jaExiste?C.primary:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {marcado&&!jaExiste&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
          </div>
          <span style={{fontSize:13,fontWeight:600,color:jaExiste?C.textMuted:C.text,flex:1}}>{nome}</span>
          {jaExiste&&<span style={{fontSize:10,color:C.textMuted,background:"#f1f5f9",borderRadius:99,padding:"1px 7px",fontWeight:600}}>já existe</span>}
        </div>);
      })}
    </div>
    <div style={{display:"flex",gap:8}}>
      <Btn onClick={onCancel} variant="ghost" style={{flex:1}}>Cancelar</Btn>
      <Btn onClick={()=>onConfirm([...sel])} variant="primary" style={{flex:2}} disabled={sel.size===0}>Importar {sel.size>0?`${sel.size} aluno(s)`:""}</Btn>
    </div>
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
